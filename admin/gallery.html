<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | MCH Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="s-overlay" id="sOverlay"></div>
<aside class="sidebar" id="sidebar">
  <a class="s-brand" href="dashboard.html"><i class="bi bi-bag-fill" style="color:var(--gold);font-size:1.2rem;"></i><div><div>Madina Cloth House</div><span>Admin Panel</span></div></a>
  <nav class="s-nav">
    <div class="s-section">Main</div>
    <a class="s-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <div class="s-section">Catalogue</div>
    <a class="s-link" href="brands.html"><i class="bi bi-award"></i> Brands</a>
    <a class="s-link" href="categories.html"><i class="bi bi-grid-3x3-gap"></i> Categories</a>
    <a class="s-link" href="products.html"><i class="bi bi-bag"></i> Products</a>
    <div class="s-section">Operations</div>
    <a class="s-link" href="inventory.html"><i class="bi bi-boxes"></i> Inventory</a>
    <a class="s-link" href="orders.html"><i class="bi bi-bag-check"></i> Orders</a>
    <a class="s-link" href="tailoring.html"><i class="bi bi-scissors"></i> Tailoring</a>
    <div class="s-section">People</div>
    <a class="s-link" href="customers.html"><i class="bi bi-people"></i> Customers</a>
    <div class="s-section">Marketing</div>
    <a class="s-link" href="promotions.html"><i class="bi bi-megaphone"></i> Promotions</a>
    <a class="s-link" href="gallery.html"><i class="bi bi-images"></i> Gallery</a>
    <div class="s-section">Finance & Reports</div>
    <a class="s-link" href="finance.html"><i class="bi bi-cash-coin"></i> Finance</a>
    <a class="s-link" href="reports.html"><i class="bi bi-bar-chart-line"></i> Reports</a>
    <div class="s-section">System</div>
    <a class="s-link" href="settings.html"><i class="bi bi-gear"></i> Settings</a>
  </nav>
  <div class="s-footer"><div class="s-brand-badge">Developed by <span>MZ Corporations</span></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.75rem;">
      <button class="btn btn-ghost btn-sm mob-toggle" onclick="toggleSidebar()"><i class="bi bi-list" style="font-size:1.2rem;"></i></button>
      <h4>Photo Gallery</h4>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportGallery()"><i class="bi bi-download"></i> Export</button>
      <label class="btn btn-gold" style="cursor:pointer;">
        <i class="bi bi-plus-lg"></i> Add Photos
        <input type="file" id="bulkUpload" accept="image/*" multiple style="display:none;" onchange="handleBulkUpload(event)">
      </label>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="grid-auto" style="margin-bottom:1.25rem;" id="galleryStats"></div>

    <!-- Filters -->
    <div class="acard" style="margin-bottom:1rem;">
      <div class="acard-body" style="padding:.85rem 1.2rem;">
        <div class="search-bar">
          <div class="search-box" style="max-width:300px;">
            <i class="bi bi-search"></i>
            <input class="finput" id="galSearch" placeholder="Search by label..." oninput="renderGallery()">
          </div>
          <div class="filter-group">
            <select id="galFilter" onchange="renderGallery()">
              <option value="">All Types</option>
              <option value="product">Products</option>
              <option value="brand">Brands</option>
              <option value="store">Store</option>
              <option value="bridal">Bridal</option>
              <option value="event">Event</option>
              <option value="other">Other</option>
            </select>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="clearAll()"><i class="bi bi-trash"></i> Clear All</button>
        </div>
      </div>
    </div>

    <!-- Gallery Grid -->
    <div id="galleryWrap"></div>
  </div>
</div>

<!-- Edit Label Modal -->
<div class="modal-overlay" id="galModal">
  <div class="modal modal-sm" style="max-width:380px;">
    <div class="modal-head">
      <h3>Edit Photo</h3>
      <button class="modal-close" onclick="closeModal('galModal')"><i class="bi bi-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="galEditId">
      <div style="margin-bottom:1rem;border-radius:10px;overflow:hidden;max-height:200px;">
        <img id="galEditPreview" src="" style="width:100%;object-fit:cover;" alt="">
      </div>
      <div class="fgroup">
        <label class="flabel">Label / Caption</label>
        <input class="finput" id="galLabel" placeholder="e.g. Bridal Collection 2025">
      </div>
      <div class="fgroup">
        <label class="flabel">Category</label>
        <select class="fselect" id="galCat">
          <option value="product">Products</option>
          <option value="brand">Brands</option>
          <option value="store">Store</option>
          <option value="bridal">Bridal</option>
          <option value="event">Event</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="fgroup">
        <label class="flabel">Show on Store Website</label>
        <select class="fselect" id="galVisible">
          <option value="true">Yes – show in gallery</option>
          <option value="false">No – hidden</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('galModal')">Cancel</button>
      <button class="btn btn-gold" onclick="saveGalEdit()"><i class="bi bi-check2"></i> Save</button>
    </div>
  </div>
</div>


<script src="js/core.js"></script>
<script src="js/gallery.js"></script>
</body>
</html>
